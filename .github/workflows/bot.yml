name: Autonomous Trading Bot

on:
  schedule:
    - cron: '45 3 * * 1-5'      # 9:15 AM IST (Market Open)
    - cron: '*/15 4-9 * * 1-5'  # Every 15 mins during market
    - cron: '0 10 * * 1-5'      # 3:30 PM IST (Market Close)
    - cron: '30 10 * * 1-5'     # 4:00 PM IST (Post-Market Final Closing Prices)
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Sync Market Data (fetch_all_data.py)
      run: python scripts/fetch_all_data.py
      
    - name: Execute Autonomous Trades (autonomous_bot.py)
      run: python scripts/autonomous_bot.py
      
    - name: Commit and Push Updates
      run: |
        git config --global user.name "AlgoBot"
        git config --global user.email "bot@trading.local"
        git add .
        git diff --staged --quiet || git commit -m "Auto-Update: Market Data & Portfolio"
        git push
